# Базовый набор правил для всего workspace. Каждый пакет наследует его через
# `include: ../../analysis_options.yaml` и дополняет своими ограничениями.
include: package:flutter_lints/flutter.yaml

analyzer:
  language:
    strict-casts: true
    strict-raw-types: true
  errors:
    dead_code: warning
    unused_import: warning
    unused_local_variable: warning
  exclude:
    - '**/*.g.dart'
    - '**/*.freezed.dart'
    - '**/gen/**'

linter:
  rules:
    prefer_single_quotes: true
    require_trailing_commas: true
    sort_child_properties_last: true
    always_declare_return_types: true
    avoid_print: true
